name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: fast-md
  GO_VERSION: '1.25.x'

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: amd64
            ext: ''
          - os: windows-latest
            platform: windows
            arch: amd64
            ext: '.exe'
          - os: macos-latest
            platform: darwin
            arch: arm64
            ext: ''
          - os: macos-latest
            platform: darwin
            arch: amd64
            ext: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libsoup-3.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        run: cd frontend && npm ci --include=dev --production=false

      - name: Generate Wails bindings
        run: wails3 generate bindings -f '-tags production' -clean=true -ts

      - name: Build frontend
        run: |
          cd frontend
          node node_modules/vue-tsc/bin/vue-tsc.js
          node node_modules/vite/bin/vite.js build --mode production

      - name: Verify frontend dist exists
        run: test -d frontend/dist && test -f frontend/dist/index.html

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.platform }}
          GOARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          out_dir="dist/${APP_NAME}-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          mkdir -p "${out_dir}"
          go build -ldflags="-s -w" -o "${out_dir}/${APP_NAME}${{ matrix.ext }}" .
          ls -la "${out_dir}/"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}/${{ env.APP_NAME }}${{ matrix.ext }}
          if-no-files-found: error

  package-macos:
    name: Package macOS apps
    needs: build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download macOS artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: ${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-*
          path: dist

      - name: Create per-arch app bundles and DMGs
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"

          for arch in arm64 amd64; do
            bin_dir="dist/${APP_NAME}-${GITHUB_REF_NAME}-darwin-${arch}"
            app_dir="/tmp/${APP_NAME}-${arch}.app"
            dist_dir="dist/${APP_NAME}-${GITHUB_REF_NAME}-darwin-${arch}-pkg"
            volume_dir="/tmp/${APP_NAME}-${arch}-dmg"

            rm -rf "${app_dir}" "${dist_dir}" "${volume_dir}"
            mkdir -p "${app_dir}/Contents/MacOS" "${app_dir}/Contents/Resources" "${dist_dir}" "${volume_dir}"

            cp "${bin_dir}/${APP_NAME}" "${app_dir}/Contents/MacOS/${APP_NAME}"
            chmod +x "${app_dir}/Contents/MacOS/${APP_NAME}"

            if [ -f "build/darwin/icons.icns" ]; then
              cp "build/darwin/icons.icns" "${app_dir}/Contents/Resources/app.icns"
            fi

            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0">' \
              '<dict>' \
              "    <key>CFBundleExecutable</key>" \
              "    <string>${APP_NAME}</string>" \
              "    <key>CFBundleIdentifier</key>" \
              "    <string>com.fastmd.${APP_NAME}</string>" \
              "    <key>CFBundleName</key>" \
              "    <string>${APP_NAME}</string>" \
              "    <key>CFBundleDisplayName</key>" \
              "    <string>Fast MD</string>" \
              "    <key>CFBundleIconFile</key>" \
              "    <string>app.icns</string>" \
              "    <key>CFBundlePackageType</key>" \
              "    <string>APPL</string>" \
              "    <key>CFBundleShortVersionString</key>" \
              "    <string>${version}</string>" \
              "    <key>CFBundleVersion</key>" \
              "    <string>${GITHUB_RUN_NUMBER}</string>" \
              "    <key>LSMinimumSystemVersion</key>" \
              "    <string>10.15</string>" \
              "    <key>NSPrincipalClass</key>" \
              "    <string>NSApplication</string>" \
              '</dict>' \
              '</plist>' > "${app_dir}/Contents/Info.plist"

            cp -R "${app_dir}" "${volume_dir}/"
            ln -s /Applications "${volume_dir}/Applications"

            hdiutil create \
              -volname "Fast MD" \
              -srcfolder "${volume_dir}" \
              -ov \
              -format ULFO \
              -fs HFS+ \
              -scrub \
              "${dist_dir}/${APP_NAME}-${GITHUB_REF_NAME}-darwin-${arch}.dmg"

            hdiutil verify "${dist_dir}/${APP_NAME}-${GITHUB_REF_NAME}-darwin-${arch}.dmg"
            shasum -a 256 "${dist_dir}/${APP_NAME}-${GITHUB_REF_NAME}-darwin-${arch}.dmg"
          done

      - name: Upload macOS arm64 package artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-arm64-pkg
          path: dist/${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-arm64-pkg/${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-arm64.dmg
          if-no-files-found: error

      - name: Upload macOS amd64 package artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-amd64-pkg
          path: dist/${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-amd64-pkg/${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-amd64.dmg
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - build
      - package-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets

      - name: Package release assets
        shell: bash
        run: |
          cd release-assets
          # Linux: ship a gzip-compressed tarball
          mkdir -p linux-amd64
          mv ${{ env.APP_NAME }}-${{ github.ref_name }}-linux-amd64/fast-md linux-amd64/fast-md
          (cd linux-amd64 && GZIP=-9 tar -czf fast-md-${{ github.ref_name }}-linux-amd64.tar.gz fast-md && rm fast-md)
          # Windows: ship a zip archive
          mkdir -p windows-amd64
          mv ${{ env.APP_NAME }}-${{ github.ref_name }}-windows-amd64/fast-md.exe windows-amd64/fast-md.exe
          (cd windows-amd64 && zip -9 fast-md-${{ github.ref_name }}-windows-amd64.zip fast-md.exe && rm fast-md.exe)
          # macOS: DMGs are already compressed
          mkdir -p darwin-arm64 darwin-amd64
          mv ${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-arm64-pkg/*.dmg darwin-arm64/fast-md-${{ github.ref_name }}-darwin-arm64.dmg
          mv ${{ env.APP_NAME }}-${{ github.ref_name }}-darwin-amd64-pkg/*.dmg darwin-amd64/fast-md-${{ github.ref_name }}-darwin-amd64.dmg
          ls -la */

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: |
            release-assets/linux-amd64/fast-md-${{ github.ref_name }}-linux-amd64.tar.gz
            release-assets/windows-amd64/fast-md-${{ github.ref_name }}-windows-amd64.zip
            release-assets/darwin-arm64/fast-md-${{ github.ref_name }}-darwin-arm64.dmg
            release-assets/darwin-amd64/fast-md-${{ github.ref_name }}-darwin-amd64.dmg