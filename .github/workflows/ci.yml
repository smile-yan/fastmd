name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25.x'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libsoup-3.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        run: cd frontend && npm ci --include=dev --production=false

      - name: Generate Wails bindings
        run: wails3 generate bindings -f '-tags production' -clean=true -ts

      - name: Build frontend
        run: |
          cd frontend
          node node_modules/vue-tsc/bin/vue-tsc.js
          node node_modules/vite/bin/vite.js build --mode production

      - name: Verify frontend dist exists
        run: test -f frontend/dist/index.html

      - name: Run tests
        run: go test -v -race ./...